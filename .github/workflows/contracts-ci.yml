name: Backend Build Check

on:
  push:
    branches: [main]
    paths:
      - 'nevo_server/**'
  pull_request:
    branches: [main]
    paths:
      - 'nevo_server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: ./nevo_server

      - name: Build backend
        run: npm run build
        working-directory: ./nevo_server
